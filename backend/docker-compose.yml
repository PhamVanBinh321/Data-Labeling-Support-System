version: '3.9'

services:

  # ─── REDIS CACHE ─────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: dlss_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - dlss_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── RABBITMQ MESSAGE BROKER ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: dlss_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: dlss
      RABBITMQ_DEFAULT_PASS: dlss_pass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - dlss_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ─── APACHE NIFI ─────────────────────────────────────────────────────────
  nifi:
    build:
      context: ./nifi
      dockerfile: Dockerfile
    container_name: dlss_nifi
    ports:
      - "8443:8443"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: adminpassword123
      NIFI_WEB_HTTPS_HOST: 0.0.0.0
      NIFI_WEB_HTTPS_PORT: 8443
    volumes:
      - nifi_data:/opt/nifi/nifi-current/data
    networks:
      - dlss_network
    restart: unless-stopped

  # ─── REPORTING DB (NiFi ghi vào, admin-service đọc ra) ───────────────────
  reporting-db:
    image: postgres:16-alpine
    container_name: dlss_reporting_db
    environment:
      POSTGRES_DB: reporting_db
      POSTGRES_USER: reporting_user
      POSTGRES_PASSWORD: reporting_pass
    volumes:
      - reporting_db_data:/var/lib/postgresql/data
      - ./reporting-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - dlss_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporting_user -d reporting_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── ADMIN SERVICE ────────────────────────────────────────────────────────
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: dlss_admin
    ports:
      - "8006:8006"
    env_file: ./admin-service/.env
    environment:
      - DATABASE_URL=postgresql://reporting_user:reporting_pass@reporting-db:5432/reporting_db
    depends_on:
      reporting-db:
        condition: service_healthy
    networks:
      - dlss_network
    restart: unless-stopped

  # ─── MINIO OBJECT STORAGE ────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: dlss_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - dlss_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ─── NGINX API GATEWAY ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: dlss_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - project-service
      - task-service
      - annotation-service
      - notification-service
      - admin-service
    networks:
      - dlss_network
    restart: unless-stopped

  # ─── AUTH SERVICE ─────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: dlss_auth
    env_file: ./auth-service/.env
    environment:
      - DATABASE_URL=postgresql://auth_user:auth_pass@auth-db:5432/auth_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dlss_network
    restart: unless-stopped

  auth-db:
    image: postgres:16-alpine
    container_name: dlss_auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - dlss_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── PROJECT SERVICE ──────────────────────────────────────────────────────
  project-service:
    build:
      context: ./project-service
      dockerfile: Dockerfile
    container_name: dlss_project
    env_file: ./project-service/.env
    environment:
      - DATABASE_URL=postgresql://project_user:project_pass@project-db:5432/project_db
      - AUTH_SERVICE_URL=http://auth-service:8001
      - RABBITMQ_URL=amqp://dlss:dlss_pass@rabbitmq:5672/
    depends_on:
      project-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dlss_network
    restart: unless-stopped

  project-db:
    image: postgres:16-alpine
    container_name: dlss_project_db
    environment:
      POSTGRES_DB: project_db
      POSTGRES_USER: project_user
      POSTGRES_PASSWORD: project_pass
    volumes:
      - project_db_data:/var/lib/postgresql/data
    networks:
      - dlss_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_user -d project_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── TASK SERVICE ─────────────────────────────────────────────────────────
  task-service:
    build:
      context: ./task-service
      dockerfile: Dockerfile
    container_name: dlss_task
    ports:
      - "8003:8003"
    env_file: ./task-service/.env
    environment:
      - DATABASE_URL=postgresql://task_user:task_pass@task-db:5432/task_db
      - AUTH_SERVICE_URL=http://auth-service:8001
      - NOTIFICATION_SERVICE_URL=http://notification-service:8005
      - RABBITMQ_URL=amqp://dlss:dlss_pass@rabbitmq:5672/
    depends_on:
      task-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dlss_network
    restart: unless-stopped

  task-db:
    image: postgres:16-alpine
    container_name: dlss_task_db
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: task_pass
    volumes:
      - task_db_data:/var/lib/postgresql/data
    networks:
      - dlss_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_user -d task_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── ANNOTATION SERVICE ───────────────────────────────────────────────────
  annotation-service:
    build:
      context: ./annotation-service
      dockerfile: Dockerfile
    container_name: dlss_annotation
    ports:
      - "8004:8004"
    env_file: ./annotation-service/.env
    environment:
      - DATABASE_URL=postgresql://annotation_user:annotation_pass@annotation-db:5432/annotation_db
      - AUTH_SERVICE_URL=http://auth-service:8001
      - TASK_SERVICE_URL=http://task-service:8003
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=dlss-media
      # MINIO_PUBLIC_HOST: URL công khai để client truy cập file
      # Đặt trong annotation-service/.env: MINIO_PUBLIC_HOST=http://<VPS_IP>:9000
      - MINIO_USE_SSL=False
    depends_on:
      annotation-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dlss_network
    restart: unless-stopped

  annotation-db:
    image: postgres:16-alpine
    container_name: dlss_annotation_db
    environment:
      POSTGRES_DB: annotation_db
      POSTGRES_USER: annotation_user
      POSTGRES_PASSWORD: annotation_pass
    volumes:
      - annotation_db_data:/var/lib/postgresql/data
    networks:
      - dlss_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U annotation_user -d annotation_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── NOTIFICATION SERVICE ─────────────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: dlss_notification
    ports:
      - "8005:8005"
    env_file: ./notification-service/.env
    environment:
      - DATABASE_URL=postgresql://notify_user:notify_pass@notification-db:5432/notify_db
      - AUTH_SERVICE_URL=http://auth-service:8001
      - REDIS_URL=redis://redis:6379/1
      - RABBITMQ_URL=amqp://dlss:dlss_pass@rabbitmq:5672/
    depends_on:
      notification-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dlss_network
    restart: unless-stopped

  notification-consumer:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: dlss_notification_consumer
    command: python manage.py run_consumer
    env_file: ./notification-service/.env
    environment:
      - DATABASE_URL=postgresql://notify_user:notify_pass@notification-db:5432/notify_db
      - AUTH_SERVICE_URL=http://auth-service:8001
      - REDIS_URL=redis://redis:6379/1
      - RABBITMQ_URL=amqp://dlss:dlss_pass@rabbitmq:5672/
    depends_on:
      notification-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dlss_network
    restart: unless-stopped

  notification-db:
    image: postgres:16-alpine
    container_name: dlss_notification_db
    environment:
      POSTGRES_DB: notify_db
      POSTGRES_USER: notify_user
      POSTGRES_PASSWORD: notify_pass
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    networks:
      - dlss_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify_user -d notify_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ─── VOLUMES ────────────────────────────────────────────────────────────────
volumes:
  auth_db_data:
  project_db_data:
  task_db_data:
  annotation_db_data:
  notification_db_data:
  minio_data:
  redis_data:
  rabbitmq_data:
  nifi_data:
  reporting_db_data:

# ─── NETWORKS ───────────────────────────────────────────────────────────────
networks:
  dlss_network:
    driver: bridge
